# =============================================
# 数智心伴 - AI数字人情感陪护系统
# Docker Compose 一键编排
# =============================================
# 【启动前准备】
#   1. 复制环境变量：cp .env.example .env
#   2. 编辑 .env 填入 DASHSCOPE_API_KEY=<你的阿里云API Key>
#
# 【常用命令】
#   启动所有服务：  docker-compose up -d
#   查看运行日志：  docker-compose logs -f
#   停止服务：      docker-compose down
#   重新构建：      docker-compose up -d --build
#
# 【访问地址】
#   主界面（数字人对话）：http://localhost:8800/
#   ASR语音评测页面：    http://localhost:8801/eval
# =============================================

version: "3.8"

services:
  # ── 主服务（对话 + 数字人驱动 + 视觉监控） ────────
  app:
    build:
      context: ../../          # 项目根目录（相对于此文件所在位置）
      dockerfile: infra/docker/Dockerfile
    image: shuzhixinban:latest
    container_name: shuzhixinban-main
    restart: unless-stopped
    ports:
      - "8800:8800"            # 主服务（Web界面 + WebSocket + 数字人驱动）
      - "8801:8801"            # ASR评测服务（评委专用端口）
    environment:
      # 必填：阿里云 DashScope API Key（用于 Qwen LLM 对话）
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - PYTHONUNBUFFERED=1
      - MODELSCOPE_CACHE=/app/.cache/modelscope
    volumes:
      # 持久化用户数据库（重启容器后不丢失会话记录）
      - ../../data/users.db:/app/data/users.db
      # 持久化知识库（RAG 心理学知识库，支持运行时更新）
      - ../../data/kb:/app/data/kb
      # 数字人面部行为驱动模型（体积大，挂载不打包）
      - ../../digital_human_engine/checkpoints_v2:/app/digital_human_engine/checkpoints_v2:ro
      # MediaPipe 人脸特征点模型
      - ../../models:/app/models:ro
      # ModelScope 模型缓存（FunASR 首次下载后复用）
      - modelscope-cache:/app/.cache/modelscope
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8800/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

# ── 持久化数据卷 ────────
volumes:
  modelscope-cache:
    driver: local
